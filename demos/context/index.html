<!doctype html>
<html lang="en">
  <head>
    <title>Context Detector Visualizer | XR Blocks Demo</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="../../samples/main.css" />
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #111;
        color: #f7f7f2;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      #context-debugger {
        position: fixed;
        inset: 12px 12px 12px auto;
        z-index: 10;
        display: grid;
        grid-template-rows: auto 1fr 1fr 1fr;
        gap: 10px;
        width: min(520px, calc(100vw - 24px));
        max-height: calc(100vh - 24px);
        pointer-events: auto;
      }

      .debug-header,
      .debug-panel {
        border: 1px solid rgb(255 255 255 / 16%);
        border-radius: 8px;
        background: rgb(18 20 22 / 90%);
        box-shadow: 0 16px 48px rgb(0 0 0 / 24%);
      }

      .debug-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
      }

      .debug-title {
        font-size: 14px;
        font-weight: 700;
      }

      .debug-status {
        color: #9fe870;
        font-family: ui-monospace, 'SFMono-Regular', Menlo, monospace;
        font-size: 12px;
      }

      .debug-panel {
        min-height: 0;
        overflow: hidden;
      }

      .debug-panel h2 {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin: 0;
        border-bottom: 1px solid rgb(255 255 255 / 12%);
        padding: 8px 10px;
        color: #f7f7f2;
        font-size: 13px;
      }

      .debug-toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: #aeb7c2;
        font-size: 11px;
        font-weight: 500;
        user-select: none;
      }

      .debug-toggle input {
        width: 14px;
        height: 14px;
        accent-color: #42d9ff;
      }

      .debug-panel pre {
        box-sizing: border-box;
        width: 100%;
        height: calc(100% - 34px);
        margin: 0;
        overflow: auto;
        padding: 10px;
        color: #d7e0ea;
        font-family: ui-monospace, 'SFMono-Regular', Menlo, monospace;
        font-size: 11px;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      #somImage {
        display: none;
        width: 100%;
        max-height: 160px;
        object-fit: contain;
        border-bottom: 1px solid rgb(255 255 255 / 12%);
        background: #050607;
      }
    </style>
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
          "three/": "https://cdn.jsdelivr.net/npm/three@0.184.0/",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "@pmndrs/uikit": "https://cdn.jsdelivr.net/npm/@pmndrs/uikit@1.0.56/dist/index.min.js",
          "@pmndrs/uikit-pub-sub": "https://cdn.jsdelivr.net/npm/@pmndrs/uikit-pub-sub@1.0.56/dist/index.min.js",
          "@pmndrs/msdfonts": "https://cdn.jsdelivr.net/npm/@pmndrs/msdfonts@1.0.56/dist/index.min.js",
          "@preact/signals-core": "https://cdn.jsdelivr.net/npm/@preact/signals-core@1.12.1/dist/signals-core.mjs",
          "yoga-layout/load": "https://cdn.jsdelivr.net/npm/yoga-layout@3.2.1/dist/src/load.js",
          "uiblocks": "../../build/addons/uiblocks/src/index.js",
          "xrblocks": "../../build/xrblocks.js",
          "xrblocks/addons/": "../../build/addons/"
        }
      }
    </script>
  </head>

  <body>
    <div id="context-debugger">
      <div class="debug-header">
        <div class="debug-title">Context Detector Visualizer</div>
        <div id="status" class="debug-status">starting</div>
      </div>
      <section class="debug-panel">
        <h2>
          <span>semanticTree</span>
          <label class="debug-toggle">
            <input id="semanticTreeEnabled" type="checkbox" checked />
            enabled
          </label>
        </h2>
        <pre id="semanticTreeOutput">Waiting for first run...</pre>
      </section>
      <section class="debug-panel">
        <h2>
          <span>visibleObjects</span>
          <label class="debug-toggle">
            <input id="visibleObjectsEnabled" type="checkbox" checked />
            enabled
          </label>
        </h2>
        <pre id="visibleObjectsOutput">Waiting for first run...</pre>
      </section>
      <section class="debug-panel">
        <h2>
          <span>som</span>
          <label class="debug-toggle">
            <input id="somEnabled" type="checkbox" checked />
            enabled
          </label>
        </h2>
        <img id="somImage" alt="SOM overlay" />
        <pre id="somOutput">Waiting for first run...</pre>
      </section>
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>
