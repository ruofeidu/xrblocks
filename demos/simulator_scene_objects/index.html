<!doctype html>
<html lang="en">
  <head>
    <title>Simulator Scene Objects</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="../demo.css" />
    <link type="text/css" rel="stylesheet" href="styles.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "@dimforge/rapier3d-simd-compat": "https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-simd-compat@0.19.2/rapier.mjs",
          "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "../../build/xrblocks.js?demo=simulator-scene-objects",
          "xrblocks/addons/": "../../build/addons/"
        }
      }
    </script>
  </head>

  <body>
    <aside id="controls">
      <h1>Simulator scene objects</h1>
      <div class="actions">
        <button id="detect" disabled>Run detection</button>
        <button id="reset" disabled>Reset dynamic box</button>
        <button id="meshes" disabled>Toggle meshes</button>
      </div>
      <figure id="depth-visualization">
        <figcaption>Simulator depth · near is white · 8 m is black</figcaption>
        <canvas id="depth-preview" width="160" height="160"></canvas>
      </figure>
      <pre id="status">Starting simulator…</pre>
    </aside>
    <script type="module" src="main.js?demo=simulator-scene-objects"></script>
  </body>
</html>
